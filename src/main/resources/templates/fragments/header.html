<header class="header" xmlns:th="http://www.thymeleaf.org" th:fragment="header(activePage)" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <script>
        //      \    /\
        //       )  ( ')        patrick.
        //      (  /  )
        //jgs    \(__)|
    </script>
    <div class="header-container">
        <div class="logo-container">
            <a th:href="@{/}" class="logo-link">
                <img th:src="@{/assets/icon/icon.ico}" alt="Telos Logo" class="logo-img">
            </a>
            <h1 class="logo">Telos</h1>
        </div>
        <nav class="nav">
            <a class="nav-btn" th:classappend="${activePage == 'home'} ? ' nav-btn--active' : ''" th:href="@{/}">Timer</a>
            <a class="nav-btn" th:classappend="${activePage == 'about'} ? ' nav-btn--active' : ''" th:href="@{/about}">About</a>
            <a class="nav-btn nav-btn--accent" th:classappend="${activePage == 'helpus'} ? ' nav-btn--active' : ''" th:href="@{/helpus}">Help Us</a>
        </nav>
        <div class="header-side">
            <a th:if="${activePage != 'home'}" th:href="@{/}" class="mini-timer mini-timer--pomodoro" id="miniTimer" aria-label="Open timer page">
                <span class="mini-timer__mode" id="miniTimerMode">Pomodoro</span>
                <span class="mini-timer__time" id="miniTimerTime">25:00</span>
                <span class="mini-timer__meta">
                    <span class="mini-timer__dot"></span>
                    <span class="mini-timer__status" id="miniTimerStatus">Ready</span>
                </span>
            </a>
            <div class="auth-controls">
                <a sec:authorize="isAnonymous()" class="profile-entry" th:classappend="${activePage == 'login'} ? ' profile-entry--active' : ''" th:href="@{/login}" id="profileEntry" aria-label="Open login page">
                    <span class="profile-entry__avatar" aria-hidden="true">
                        <svg class="profile-entry__icon" viewBox="0 0 24 24" focusable="false">
                            <path d="M12 12c2.761 0 5-2.687 5-6s-2.239-6-5-6-5 2.687-5 6 2.239 6 5 6Z"></path>
                            <path d="M21 24c0-4.971-4.029-9-9-9s-9 4.029-9 9"></path>
                        </svg>
                    </span>
                    <span class="profile-entry__label" id="profileEntryLabel">Login</span>
                </a>
                <details sec:authorize="isAuthenticated()" class="account-menu">
                    <summary class="profile-entry" th:classappend="${activePage == 'user'} ? ' profile-entry--active' : ''" aria-label="Open account menu">
                        <span class="profile-entry__avatar" aria-hidden="true">
                            <svg class="profile-entry__icon" viewBox="0 0 24 24" focusable="false">
                                <path d="M12 12c2.761 0 5-2.687 5-6s-2.239-6-5-6-5 2.687-5 6 2.239 6 5 6Z"></path>
                                <path d="M21 24c0-4.971-4.029-9-9-9s-9 4.029-9 9"></path>
                            </svg>
                        </span>
                        <span class="profile-entry__label">Account</span>
                        <span class="account-menu__caret" aria-hidden="true"></span>
                    </summary>
                    <div class="account-menu__panel">
                        <a class="account-menu__link" th:href="@{/user}">Account settings</a>
                        <form th:action="@{/logout}" method="post" class="account-menu__form">
                            <button type="submit" class="account-menu__button">Log out</button>
                        </form>
                    </div>
                </details>
            </div>
        </div>
    </div>
</header>

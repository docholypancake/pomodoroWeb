<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Pomodoro Web</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=9)}">
    <link rel="icon" th:href="@{/assets/icon/icon.ico(v=9)}" type="image/x-icon">
</head>
<body>
    <th:block th:replace="~{fragments/header :: header('user')}"></th:block>

    <main class="main-content">
        <div class="container profile-shell">
            <section class="auth-card">
                <p class="eyebrow">Profile</p>
                <h2 class="auth-title">User Settings</h2>
                <p class="auth-description">
                    Profile details and password changes are prepared here for the upcoming backend integration.
                </p>
                <div class="profile-toolbar">
                    <button type="button" class="btn btn--secondary btn--small auth-logout hidden" id="logoutBtn">Log Out</button>
                </div>

                <div class="profile-grid">
                    <form id="profileForm" class="auth-form profile-panel" data-auth-form="profile" novalidate>
                        <h3 class="profile-panel-title">Public Profile</h3>

                        <div class="auth-field">
                            <label class="settings-label" for="profileName">Display Name</label>
                            <input type="text" id="profileName" class="settings-input auth-input" name="displayName" autocomplete="name">
                            <p class="form-field-error hidden" data-error-for="profileName"></p>
                        </div>

                        <p class="form-message hidden" data-form-message aria-live="polite"></p>

                        <button type="submit" class="btn btn--primary auth-submit">Save Name</button>
                    </form>

                    <form id="passwordForm" class="auth-form profile-panel" data-auth-form="password" novalidate>
                        <h3 class="profile-panel-title">Security</h3>

                        <div class="auth-field">
                            <label class="settings-label" for="currentPassword">Current Password</label>
                            <input type="password" id="currentPassword" class="settings-input auth-input" name="currentPassword" autocomplete="current-password">
                            <p class="form-field-error hidden" data-error-for="currentPassword"></p>
                        </div>

                        <div class="auth-field">
                            <label class="settings-label" for="newPassword">New Password</label>
                            <input type="password" id="newPassword" class="settings-input auth-input" name="newPassword" autocomplete="new-password">
                            <p class="form-field-error hidden" data-error-for="newPassword"></p>
                        </div>

                        <div class="auth-field">
                            <label class="settings-label" for="confirmPassword">Confirm New Password</label>
                            <input type="password" id="confirmPassword" class="settings-input auth-input" name="confirmPassword" autocomplete="new-password">
                            <p class="form-field-error hidden" data-error-for="confirmPassword"></p>
                        </div>

                        <p class="form-message hidden" data-form-message aria-live="polite"></p>

                        <button type="submit" class="btn btn--primary auth-submit">Change Password</button>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>

    <script th:src="@{/js/timer-state.js(v=9)}"></script>
    <script th:src="@{/js/mini-timer.js(v=9)}"></script>
    <script th:src="@{/js/auth-state.js(v=9)}"></script>
    <script th:src="@{/js/auth-forms.js(v=9)}"></script>
</body>
</html>

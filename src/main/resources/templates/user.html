<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Profile - Telos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" th:href="@{/assets/icon/icon.ico}" type="image/x-icon">
</head>
<body>
    <th:block th:replace="~{fragments/header :: header('user')}"></th:block>

    <main class="main-content">
        <div class="container profile-shell">
            <section class="auth-card auth-card--wide">
                <p class="eyebrow">Profile</p>
                <h2 class="auth-title">User Settings</h2>
                <p class="auth-description">
                    Profile details and password changes are prepared here for the upcoming backend integration.
                </p>

                <div class="profile-grid">
                    <form id="username-form" class="auth-form profile-panel" novalidate>
                        <h3 class="profile-panel-title">Public Profile</h3>

                        <div class="auth-field">
                            <label class="settings-label" for="username">Username</label>
                            <input type="text" id="username" class="settings-input auth-input" name="username" autocomplete="username" th:value="${curUsername}">
                            <p class="form-field-error hidden" data-error-for="username"></p>
                        </div>

                        <p id="username-message" class="form-message hidden" aria-live="polite"></p>

                        <button type="submit" class="btn btn--primary auth-submit">Save Name</button>
                    </form>

                    <form id="password-form" class="auth-form profile-panel" novalidate>
                        <h3 class="profile-panel-title">Security</h3>

                        <div class="auth-field">
                            <label class="settings-label" for="oldPassword">Current Password</label>
                            <input type="password" id="oldPassword" class="settings-input auth-input" name="oldPassword" autocomplete="current-password">
                            <p class="form-field-error hidden" data-error-for="oldPassword"></p>
                        </div>

                        <div class="auth-field">
                            <label class="settings-label" for="newPassword">New Password</label>
                            <input type="password" id="newPassword" class="settings-input auth-input" name="newPassword" autocomplete="new-password">
                            <p class="form-field-error hidden" data-error-for="newPassword"></p>
                        </div>

                        <div class="auth-field">
                            <label class="settings-label" for="confirmNewPassword">Confirm New Password</label>
                            <input type="password" id="confirmNewPassword" class="settings-input auth-input" name="confirmNewPassword" autocomplete="new-password">
                            <p class="form-field-error hidden" data-error-for="confirmNewPassword"></p>
                        </div>

                        <p id="password-message" class="form-message hidden" aria-live="polite"></p>

                        <button type="submit" class="btn btn--primary auth-submit">Change Password</button>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer :: footer}"></th:block>

    <th:block th:replace="~{fragments/mini-timer-scripts :: scripts}"></th:block>
    <script th:src="@{/js/user-settings.js}"></script>
</body>
</html>
